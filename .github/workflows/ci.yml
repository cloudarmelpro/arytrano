name: CI

on:
  pull_request:
  push:
    branches: [main]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

env:
  # Dummy — lib/env.ts only requires a syntactically valid URL outside
  # the runtime boot; next build runs in NEXT_PHASE=phase-production-build.
  DATABASE_URL: postgresql://ci:ci@localhost:5432/arytrano_ci
  AUTH_SECRET: ci-only-not-a-real-secret-32-chars-min
  AUTH_URL: http://localhost:3000

jobs:
  lint-typecheck:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      # tsc needs the generated Prisma client types
      - run: npx prisma generate
        working-directory: apps/web
      - run: npm run lint -w @arytrano/web
      - run: npm run typecheck -w @arytrano/web
      - run: npm run typecheck -w @arytrano/shared

  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      # npm's optionalDependencies bug (npm/cli#4828) — lockfile was
      # regenerated on Windows so Linux platform binaries are pinned
      # but not installed. Force-fetch what CI needs (mirrors the
      # vercel.json installCommand pattern).
      - run: |
          npm install --no-save --force \
            @rolldown/binding-linux-x64-gnu@1.0.2 \
            @next/swc-linux-x64-gnu \
            lightningcss-linux-x64-gnu \
            @tailwindcss/oxide-linux-x64-gnu
      - run: npx prisma generate
        working-directory: apps/web
      - name: Vitest with coverage (informational on PR)
        working-directory: apps/web
        run: |
          set +e
          npx vitest run \
            --reporter=default \
            --reporter=github-actions \
            --coverage.enabled \
            --coverage.reporter=text \
            --coverage.reporter=json-summary 2>&1 | tee /tmp/vitest.log
          code=${PIPESTATUS[0]}
          if [ "$code" -ne 0 ]; then
            echo "::group::Error-looking lines from vitest (last 10 matches)"
            grep -Ei "(Error|Failed|FAIL|Cannot|Missing|✗|Unhandled|Startup)" /tmp/vitest.log \
              | tail -n 10 \
              | while IFS= read -r line; do echo "::error::$line"; done
            echo "::endgroup::"
          fi
          exit "$code"
      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: coverage-summary
          path: apps/web/coverage/coverage-summary.json

  migrate-check:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:17
        env:
          POSTGRES_USER: ci
          POSTGRES_PASSWORD: ci
          POSTGRES_DB: arytrano_ci
        ports: ['5432:5432']
        options: >-
          --health-cmd="pg_isready -U ci"
          --health-interval=5s
          --health-timeout=5s
          --health-retries=10
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - run: npx prisma validate
        working-directory: apps/web
      - name: Migrations apply cleanly from scratch
        run: npx prisma migrate deploy
        working-directory: apps/web
      - name: Schema matches migrations (drift check)
        # Prisma 7 dropped --from-url + --shadow-database-url. Compare
        # the live post-`migrate deploy` DB state against schema.prisma
        # via --from-config-datasource → no shadow DB dance needed and
        # any drift between the migrations and the schema surfaces here.
        run: >-
          npx prisma migrate diff
          --from-config-datasource
          --to-schema prisma/schema.prisma
          --exit-code
        working-directory: apps/web

  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      # npm's optionalDependencies bug (npm/cli#4828) — force-fetch the
      # Linux platform binaries the Windows-generated lockfile misses.
      - run: |
          npm install --no-save --force \
            @next/swc-linux-x64-gnu \
            lightningcss-linux-x64-gnu \
            @tailwindcss/oxide-linux-x64-gnu \
            @img/sharp-linux-x64 \
            @img/sharp-libvips-linux-x64
      # Skip `migrate deploy` — that's Vercel's job. next build tolerates
      # the dummy DATABASE_URL because NEXT_PHASE=phase-production-build.
      - name: Next build
        working-directory: apps/web
        run: |
          set +e
          npx prisma generate && npx next build 2>&1 | tee /tmp/build.log
          code=${PIPESTATUS[0]}
          if [ "$code" -ne 0 ]; then
            echo "::group::Error-looking lines from build (last 10 of matches)"
            grep -Ei "(Error|Failed|Cannot|Missing|Module not found|Unable|✗|FAIL)" /tmp/build.log \
              | tail -n 10 \
              | while IFS= read -r line; do echo "::error::$line"; done
            echo "::endgroup::"
          fi
          exit "$code"

  mobile-typecheck:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      # Root install first — mobile symlinks @arytrano/shared via
      # file:../../packages/shared, and shared's own zod peer dep must
      # be present at that path or tsc collapses `z.infer<T>` to `any`
      # inside every consumed schema, cascading through MoveInWindow /
      # LeaseRow / MessageKey lookups.
      - run: npm ci
      # apps/mobile is NOT in the root npm workspaces — its own install.
      - run: npm ci
        working-directory: apps/mobile
      - name: Mobile tsc
        working-directory: apps/mobile
        run: |
          set +e
          # `--pretty false` prints file:line:col prefix on every diagnostic
          # so the ::error:: dump below actually names the offending file.
          npx tsc --noEmit --pretty false 2>&1 | tee /tmp/mobile.log
          code=${PIPESTATUS[0]}
          if [ "$code" -ne 0 ]; then
            echo "::group::Full tsc output"
            while IFS= read -r line; do echo "::error::$line"; done < /tmp/mobile.log
            echo "::endgroup::"
          fi
          exit "$code"
